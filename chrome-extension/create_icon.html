<!DOCTYPE html>
<html>
<head>
    <title>Icon Generator</title>
</head>
<body>
    <h1>Extension Icon Generator</h1>
    <canvas id="icon128" width="128" height="128"></canvas>
    <canvas id="icon48" width="48" height="48"></canvas>
    <canvas id="icon16" width="16" height="16"></canvas>
    
    <script>
    function drawIcon(canvas, size) {
        const ctx = canvas.getContext('2d');
        const center = size / 2;
        
        // 클리어
        ctx.clearRect(0, 0, size, size);
        
        // 배경 그라디언트 원
        const gradient = ctx.createRadialGradient(center, center, 0, center, center, center);
        gradient.addColorStop(0, '#764ba2');
        gradient.addColorStop(1, '#667eea');
        
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(center, center, center * 0.9, 0, Math.PI * 2);
        ctx.fill();
        
        // 비디오 카메라 아이콘
        const scale = size / 128;
        
        // 카메라 본체
        ctx.fillStyle = 'white';
        ctx.fillRect(
            center - 30 * scale, 
            center - 20 * scale,
            60 * scale,
            40 * scale
        );
        
        // 카메라 렌즈
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.arc(
            center + 15 * scale,
            center,
            15 * scale,
            0, Math.PI * 2
        );
        ctx.fill();
        
        // 렌즈 반사
        ctx.fillStyle = '#666';
        ctx.beginPath();
        ctx.arc(
            center + 15 * scale,
            center,
            5 * scale,
            0, Math.PI * 2
        );
        ctx.fill();
        
        // 녹화 표시
        ctx.fillStyle = '#ff0000';
        ctx.beginPath();
        ctx.arc(
            center - 20 * scale,
            center - 10 * scale,
            5 * scale,
            0, Math.PI * 2
        );
        ctx.fill();
        
        // 플레이 버튼 (중앙)
        ctx.fillStyle = 'rgba(255,255,255,0.8)';
        ctx.beginPath();
        ctx.moveTo(center - 10 * scale, center - 12 * scale);
        ctx.lineTo(center - 10 * scale, center + 12 * scale);
        ctx.lineTo(center + 8 * scale, center);
        ctx.closePath();
        ctx.fill();
        
        return canvas;
    }
    
    // 각 크기별 아이콘 그리기
    drawIcon(document.getElementById('icon128'), 128);
    drawIcon(document.getElementById('icon48'), 48);
    drawIcon(document.getElementById('icon16'), 16);
    
    // 다운로드 링크 생성
    function downloadCanvas(canvasId, filename) {
        const canvas = document.getElementById(canvasId);
        canvas.toBlob(function(blob) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        });
    }
    
    // 자동 다운로드 버튼 추가
    setTimeout(() => {
        document.body.innerHTML += '<br><br>';
        ['128', '48', '16'].forEach(size => {
            const btn = document.createElement('button');
            btn.textContent = `Download icon-${size}.png`;
            btn.onclick = () => downloadCanvas(`icon${size}`, `icon-${size}.png`);
            document.body.appendChild(btn);
            document.body.appendChild(document.createElement('br'));
        });
    }, 100);
    </script>
</body>
</html>
