<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
    <!-- 배경 원 (그라디언트) -->
    <defs>
        <radialGradient id="bg-gradient-128">
            <stop offset="0%" style="stop-color:#764ba2;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#667eea;stop-opacity:1" />
        </radialGradient>
    </defs>
    
    <!-- 배경 -->
    <circle cx="64" cy="64" r="57.6" fill="url(#bg-gradient-128)" />
    
    <!-- 비디오 카메라 아이콘 -->
    <!-- 카메라 본체 -->
    <rect x="34" y="44" 
          width="60" height="40" 
          fill="white" rx="5" />
    
    <!-- 카메라 렌즈 -->
    <circle cx="79" cy="64" r="15" fill="#333" />
    <circle cx="79" cy="64" r="5" fill="#666" />
    
    <!-- 녹화 표시 -->
    <circle cx="44" cy="54" r="5" fill="#ff0000">
        <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- 플레이 버튼 -->
    <path d="M 54 52 
             L 54 76 
             L 72 64 Z" 
          fill="rgba(255,255,255,0.8)" />
</svg>