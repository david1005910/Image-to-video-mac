<?xml version="1.0" encoding="UTF-8"?>
<svg width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
    <!-- 배경 원 (그라디언트) -->
    <defs>
        <radialGradient id="bg-gradient-16">
            <stop offset="0%" style="stop-color:#764ba2;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#667eea;stop-opacity:1" />
        </radialGradient>
    </defs>
    
    <!-- 배경 -->
    <circle cx="8" cy="8" r="7.2" fill="url(#bg-gradient-16)" />
    
    <!-- 비디오 카메라 아이콘 -->
    <!-- 카메라 본체 -->
    <rect x="4.25" y="5.5" 
          width="7.5" height="5" 
          fill="white" rx="0.625" />
    
    <!-- 카메라 렌즈 -->
    <circle cx="9.875" cy="8" r="1.875" fill="#333" />
    <circle cx="9.875" cy="8" r="0.625" fill="#666" />
    
    <!-- 녹화 표시 -->
    <circle cx="5.5" cy="6.75" r="0.625" fill="#ff0000">
        <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- 플레이 버튼 -->
    <path d="M 6.75 6.5 
             L 6.75 9.5 
             L 9 8 Z" 
          fill="rgba(255,255,255,0.8)" />
</svg>